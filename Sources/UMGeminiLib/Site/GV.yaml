episodio:
  titolo: "Good Vibrations - Ep. 1"
  temi_principali:
    - Sviluppo software e Intelligenza Artificiale (Vibe Coding)
    - Impatto del Vibe Coding sulle community Open Source
    - Automazione e prototipazione rapida (Design, Cloud Code)
    - Sostenibilità energetica ed ambientale dei Data Center
    - Debito tecnico e perdita di competenze umane (skill degradation)

strumenti_e_tecnologie_citati:
  prototipazione_e_ui:
    - Design (Google)
    - Cloud Code
    - Figma
    - Stitch
  sviluppo_e_linguaggi:
    - Hugo (Static Site Generator)
    - PHP
    - MySQL
    - React
