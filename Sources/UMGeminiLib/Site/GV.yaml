    - modello: "Sora 2"
      caratteristiche: "Miglioramento coerenza fisica, qualità audio e regia cinematografica rispetto a Veo 3"
    - modello: "Veo 3"
      stato: "Superato tecnicamente da Sora 2"
    - modello: "Kling"
      nota: "Modello utilizzato in test comparativi professionali"
  generazione_codice_e_llm:
    - modello: "Claude 3.5 Sonnet"
      giudizio: "Attualmente il più risolutivo ed efficace per programmazione professionale"
      caratteristiche: "Velocità di esecuzione, capacità di revisione globale, verbosità elevata, integrazione con IDE"
      problemi_noti: "Allucinazioni in contesti prolungati, tendenza all'overfitting sui benchmark"
    - modello: "GPT-4"
      stato: "Segnalato come depotenziato in prossimità del rilascio di versioni superiori"
    - modello: "Gemini 3.0"
      stato: "Attesa per il rilascio, focus su integrazione hardware/software avanzata"
  strumenti_ecosistema:
    - "JetBrains PHPStorm + Integrazione AI ufficiale"
    - "Xcode + integrazione ChatGPT"
    - "MCP (Model Context Protocol): Protocollo per connettività agentica tra LLM e software terzi"
    - "N8N: Automazione workflow agentico"
    - "Apple Intelligence (on-device): Utilizzata per parsing input vocale in Obsidian tramite Shortcuts"

workflow_sviluppo_adottati:
  approccio_tecnico:
    - "Scomposizione del problema in sottoproblemi atomici"
    - "Utilizzo di Git per il consolidamento incrementale (checkpointing)"
    - "Scrittura di unit test guidata da LLM"
    - "Revisione maniacale del codice generato vs stile personale"
    - "Uso di istruzioni di sistema per definire naming convention e pattern"
  limitazioni:
    - "Perdita di contesto a lungo termine (token limit/degradazione)"
    - "Tendenza dei modelli a non riconoscere le modifiche apportate negli step precedenti"
    - "Necessità di riavviare le chat per task complessi per preservare la coerenza"

analisi_critica:
  impatto_professionale:
    - "Trasformazione del ruolo dello sviluppatore in 'domatore di LLM'"
    - "Rischio di atrofia per le nuove leve (Junior) che delegano la scrittura del codice senza comprenderne la logica"
    - "Necessità di iper-specializzazione su domini critici dove l'AI non garantisce determinismo"
  tendenze_mercato:
    - "Saturazione di output generato automaticamente"
    - "Aumento esponenziale della quantità di codice prodotto, ma con valore unitario diluito"
    - "Transizione dalla fase democratica (LLM accessibili) a modelli oligopolistici (costi di licenza enterprise)"

dati_di_produzione:
  contenuti_extra: "Blooper registrati in coda all'episodio"
  disponibilita: "Disponibile su Apple Podcast"


