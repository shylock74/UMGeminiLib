episodio: "Quinta puntata: Good Vibrations"
host:
  - Alex Racuglio
  - Luca Francesca
  - Valerio Galano
tematiche_principali:
  - "Wild Coding: Integrazione massiva di AI nel workflow di sviluppo"
  - "AI Agents vs Chatbots: Evoluzione dell'interazione uomo-macchina"
  - "Strategie di prompt engineering: Iterazione e miglioramento del codice generato"
  - "Infrastruttura e modelli: Passaggio dai LLM generalisti a modelli locali/verticali"
  - "Impatto dell'AI nel mercato della consulenza e professionalità tecnica"
tecnologie_e_modelli_citati:
  - LLM: GPT-4, GPT-5, Claude (Opus/Sonnet), Gemini 3 Pro, Grok, Mistral, Llama (Meta)
  - Framework/Tool: Office Copilot, JetBrains AI Assistant (Giuni), GitHub Copilot, VS Code Chat Agent, Ollama
  - Linguaggi: PHP, Go, Python, Haskell, Lua, Cobol, Fortran, Swift, Elixir, Julia
  - Piattaforme/Servizi: Figma (dataset training), Suno, FreePik, Obsidian, Docker/Kubernetes (sottintesi in contesti infrastrutturali)
insights_tecnici:
  - "Wild Coding definito come: Approccio pragmatista per automatizzare task tramite script generati da AI, spesso superando il costo-opportunità della scrittura manuale."
  - "Vantaggio competitivo dei modelli cinesi: Basso costo, alta efficienza, possibilità di esecuzione in locale (on-device)."
  - "Workflow ideale per UI: Struttura dati definita dall'umano, business logic gestita dall'LLM, iterazione via file export/import (es. XML)."
  - "Limite dei modelli generalisti: Allucinazioni su domini esoterici; necessità di RAG (Retrieval-Augmented Generation) o training su dataset chiusi (es. documentazione interna bancaria)."
  - "Sostenibilità: Crisi di disponibilità di VRAM a livello globale; impatto energetico dei data center come nuovo collo di bottiglia fisico."
  - "Evoluzione artistica: Il concetto di 'errore di generazione' come nuova forma di espressione creativa (riferimento a 'Merda d'artista' di Manzoni)."
metodologia_lavorativa:
  - "Spostamento da 'App per tutto' a 'Verticalizzazione estrema': Generazione di codice/contenuti personalizzati 'usa e getta' per task specifici."
  - "Agentic workflow: Uso di modelli specializzati per il refactoring rispetto a modelli generici per la creazione ex-novo."
  - "Uso di AI per analisi di dati storici personali/aziendali per automiglioramento (Self-Mirroring)."
dilemmi_etici:
  - "Violazione di copyright nel training set (dataset scraping)."
  - "Sostituzione della manodopera esterna (outsourcing) con automazione agentica."
  - "Perdita di competenze tecniche fondamentali a causa della dipendenza da strumenti generativi."
  - "Centralizzazione della conoscenza tramite LLM (rischio di loop di dati parzialmente corretti)."


