  - Sviluppo software assistito da AI (Vibecoding)
  - Progettazione e refactoring di architetture software tramite LLM
  - Sperimentazione con modelli di generazione video e robotica umanoide
  - Metodologie di project management applicate a progetti personali

tecnologie_e_tool_citati:
  - LLM: Gemini 1.5, Gemini 2.5, Gemini 3.0 (in attesa), Claude 3.5 Sonnet
  - Framework e Librerie: React, Zustand, Godot
  - Tool AI: Google AI Studio (App Builder), OpenAI Sora, Veo 3.1, Stable Diffusion (con Lora), Ideogram/Imagen
  - Hardware: Robot umanoidi (generico, costo 15k-30k euro), Vic 20, Spectrum, Commodore 64

progetto_the_safe_place:
  autore: Simone Pizzi
  descrizione: RPG basato su testo ispirato ai titoli anni '80 (Apple II, Commodore 64)
  stack_tecnologico: React (iniziale), Godot, architettura basata su file statici (JSON/Assets)
  stato_sviluppo: Versione 1.8.0 (post-refactoring totale)
  metodologia: Iterativa (sviluppo rapido in 3 giorni post-prototipazione di 5 mesi)
  criticità: Gestione dei contesti (context window) degli LLM, bug di rendering su web, gestione della coerenza grafica
  finanziamento: Crowdfunding via GoFundMe

note_tecniche_sviluppo:
  - Approccio: "Literate Programming" tramite linguaggio naturale verso LLM
  - Gestione Progetto: Separazione logica di business (Core) e layer di interfaccia (UX/Visual)
  - Problematica: Limiti di rendering di mappe di grandi dimensioni (250x250 celle) in ambiente browser
  - Soluzione adottata: Migrazione da mappa ASCII procedurale a sistema di tile grafiche

osservazioni_settore:
  - Tendenza: Iper-automazione vs. acquisizione di competenze metodologiche (metodo scientifico)
  - Regolamentazione: Critiche a OpenAI per la deregolamentazione aggressiva
  - Intelligenza Artificiale: Strumento di potenziamento della logica di programmazione, non sostituto completo del developer
  - Workflow: Necessità di strutturare i progetti in componenti modulari (Model-View-Controller) per favorire l'interazione con gli LLM


