dati_tecnici_workflow:
  metodologia_vibecoding:
    - Integrazione LLM con repository Git locale
    - Analisi codice sorgente esistente per modellazione template
    - Trasformazione rapida di mockup in componenti integrabili
    - Riduzione tempi di sviluppo (dal mese a pochi giorni)
