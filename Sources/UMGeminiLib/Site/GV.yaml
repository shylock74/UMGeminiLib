episodio:
  titolo: "Good Vibrations - Episodio 1"
  partecipanti:
    - Alex Racuglia
    - Valerio Galano
    - Luca Francesca
  argomenti_principali:
    - Sviluppo software potenziato dall'IA (AI-assisted coding)
    - Workflow di produzione contenuti con modelli generativi
    - Analisi dei limiti dei servizi e delle policy di moderazione
    - Crisi di sostenibilità e modelli di business delle big tech (OpenAI, Anthropic, Google)
    - Gestione dei costi dei token e finestre di contesto (LLM)
    - Programmazione multi-agente
  tecnologie_servizi_menzionati:
    - Modelli Video: "Siddence 2.0", Sora (OpenAI)
    - LLM: GPT-4o, Claude (Sonnet 3.5, Opus), Gemini (Google)
    - Tool & CLI: Claude Code, Gemini CLI, GitHub (con server MCP), Visual Studio Code, JetBrains IDE
    - Servizi: FreePick, XFIL, Discord, Google Drive (Takeout), Microsoft 365 Copilot, ServiceNow
  dati_tecnici_osservati:
    - "Siddence 2.0": generazione video (1-15 secondi), vincoli di policy restrittivi.
    - "Multi-agent coding": analisi di agenti specializzati (web designer, SQL expert) operanti in sincrono per ottimizzazione output.
    - "Strategie di risparmio token": uso di placeholder, suddivisione atomica del task, riduzione verbosità modello, indicizzazione documentazione per LLM.
    - "Analisi costi": degradazione dei piani di abbonamento (es. Google Drive/Gemini) e imposizione di limiti di utilizzo stringenti (token rate limiting).
    - "Integrazioni IDE": uso di plugin per intercettazione diff (es. JetBrains plugin per CLI Claude) per visualizzazione sicura delle modifiche al codice.
  critiche_tecniche:
    - "Overhead NPM": criticità nella gestione delle dipendenze lato client.
    - "UI/UX LLM": insoddisfazione per l'interfaccia dell'app nativa Claude (poco pratica per il coding).
    - "Opacità": mancanza di trasparenza nelle variazioni dei Termini di Servizio e nei limiti di consumo reale tra diverse piattaforme.
    - "Limitazioni Gemini": peggioramento delle prestazioni ("depotenziamento") e complessità nel monitoraggio dell'utilizzo dei token.


