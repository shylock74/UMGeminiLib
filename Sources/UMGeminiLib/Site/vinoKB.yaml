  perche_funziona: "L'acidità sferzante e la salinità del Cortese 'Dantan' agiscono da 'cleanser' palatale, ripulendo l'untuosità del baccalà e del burro chiarificato, mentre le note di lievito e tostatura del vino creano un legame aromatico perfetto con la complessità del ripieno."

