abbinamento:
  teoria: "Armonia per contrasto e concordanza: l'acidità e i tannini maturi del Pinot Nero sgrassano l'untuosità del fritto e la succulenza del piccione; la nota amaricante del vino bilancia la dolcezza del topinambo."
  perche_funziona: "L'intensità aromatica del Pinot Nero supporta la carnosità nobile del volatile, mentre la trama tannica fine ed elegante non prevarica la delicatezza delle fibre della carne."

