  teoria: "Armonia per contrapposizione (tannini/acidità vs succulenza/untuosità) e per concordanza di persistenza e struttura."
  perche_funziona: "L'acidità e i tannini maturi del Carmignano detergono la cavità orale dall'untuosità del fondo bruno e dalla componente grassa della pancetta, mentre la complessità terziaria del vino si fonde con la profondità aromatica della carne brasata."

