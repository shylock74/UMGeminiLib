  profilo: [Rosso rubino con riflessi porpora, Prugna secca, Ciliegia, Marmellata di more, Balsamico (menta, alloro), Vaniglia, Chiodo di garofano, Pepe nero, Sottobosco]
piatto:
  nome: "Spalla di agnello farcita con spinaci, salsiccia, prosciutto crudo di Parma e Parmigiano Reggiano 24 mesi"
