abbinamento:
  teoria: "Equilibrio per contrapposizione e complementarietà: la spina dorsale acida e il pH basso del Timorasso tagliano l'untuosità del ragù, mentre la struttura del vino regge l'intensità aromatica del coniglio."
  perche_funziona: "La nota di timo nel piatto richiama la componente erbacea del vitigno; l'acidità citrina del Dertona (nella versione Stelvin) detersifica il palato, bilanciando il grasso del battuto e favorendo la persistenza gusto-olfattiva."

