episodio: "Côte-Rôtie Neve 2016 - M. Chapoutier"
vino:
  nome: "Côte-Rôtie 'Neve', Maison M. Chapoutier"
  vitigno: "Syrah 100%"
  tecnica: "Vinificazione in biodinamica, fermentazione con lieviti indigeni, diraspatura 100%, macerazione prolungata per polimerizzazione dei tannini, affinamento 15-18 mesi (80% legno di cui 20% nuovo, 20% cemento), non filtrato, non chiarificato."
  profilo: [ciliegia, mora di gelso, pepe nero marcato, note terrose, cacao, vaniglia, sentori balsamici, tannino setoso, riduttivo]
piatto:
  nome: "Manzo brasato con purea di castagne e funghi cardoncelli"
  cottura: "Brasatura a lunga cottura (cappello del prete), CBT per i funghi cardoncelli seguita da piastra."
  struttura: [succulenza, grassezza, dolcezza della castagna/fava tonka, croccantezza chips topinambur, complessità aromatica, consistenza fibrosa]
abbinamento:
  teoria: "Ricerca di contrapposizione tra il tannino del Syrah e la componente grassa/succulenta del brasato; le note terrose del vino dialogano con la componente fungina del piatto."
  perche_funziona: "L'abbinamento risulta parziale: la struttura e il tannino giovane del vino (2016) sovrastano la succulenza del cappello del prete. La persistenza del piatto supera quella del vino, indicando la necessità di un taglio con maggiore connettivo (es. guancia) per bilanciare l'astringenza del tannino."

---
episodio: "Pomorosso - Coppo"
vino:
  nome: "Pomorosso, Coppo"
  vitigno: "Barbera 100%"
  tecnica: "Vinificazione separata per parcelle (Agliano Terme, Castelnuovo Calcea, Nizza Monferrato); fermentazione alcolica e malolattica in acciaio; affinamento 14-18 mesi in barrique di rovere francese nuovo."
  profilo: [prugna secca, confettura di more, rabarbaro, eucalipto, vaniglia, liquirizia, cuoio, note terrose, sottobosco]
piatto:
  nome: "Filetto di maiale bardato allo speck con salsa di Robiola di Roccaverano, terrina di patate e nocciole, gel di mela renetta speziato"
  cottura: "Cottura tradizionale (arrosto) con bardatura e assemblaggio di elementi composti"
  struttura: [grassezza, succulenza, sapidità, aromaticità complessa, croccantezza, acidità rinfrescante, tendenza dolce]
abbinamento:
  teoria: "Armonia per contrapposizione (acidità del vino vs grassezza della salsa e della carne) e concordanza (persistenza aromatica)."
  perche_funziona: "L'acidità spiccata e la struttura tannica polimerizzata del Barbera tagliano la grassezza della Robiola e del grasso dello speck, mentre le note speziate del gel di mela creano un ponte con l'affinamento in legno del vino."

---
episodio: "Il Nobile di Montepulciano 2019 - Avignonesi"
vino:
  nome: "Nobile di Montepulciano 2019, Avignonesi"
  vitigno: "Sangiovese (Prugnolo Gentile)"
  tecnica: "Biodinamica, inoculo con pied-de-cuve, macerazione di 20-22 giorni, affinamento 18 mesi in botte grande e piccoli contenitori (barrique/tonneau), 6 mesi di affinamento in bottiglia."
  profilo: [prugna, marasca, arancia amara, vaniglia, pepe, cuoio, note terrose, verticale, succoso, tannini a trama fitta]
piatto:
  nome: "Guancetta di maiale brasata, terrina di zucca, crema di zucca e patate, croccante di castagne, spinaci al burro e zest di limone"
  cottura: "Brasatura lunga (cbt/stufato) su fondo di verdure, frittura (chips di castagne), sbollentatura (spinaci)"
  struttura: [succulenza, scioglievolezza, grassezza, dolcezza della zucca, croccantezza, persistenza aromatica, note agrumate]
abbinamento:
  teoria: "Bilanciamento per concordanza e contrapposizione: l'alcolicità e l'acidità del Sangiovese contrastano la grassezza e la succulenza della guancia, mentre la trama tannica si ammorbidisce grazie alla dolcezza della zucca e alla consistenza del piatto."
  perche_funziona: "L'equilibrio tra la spinta acida/alcolica del vino e la componente grassa/umami della guancia, sostenuto da una persistenza aromatica speculare indotta dalle note terziarie del Nobile e dalle sfumature vegetali/agrumate del piatto."

---
episodio: "Valtellina Superiore Sassella Rocce Rosse 2016"
vino:
  nome: "ARPEPE - Valtellina Superiore Sassella Riserva 'Rocce Rosse'"
  vitigno: "Nebbiolo (Chiavennasca)"
  tecnica: "Vinificazione in tini troncoconici da 50 hl, macerazione lunga (100 giorni), affinamento 3 anni in botti storiche di castagno/rovere/acacia, ulteriore affinamento 3 anni in bottiglia."
  profilo: [violetta, cassis, ciliegia, prugna, pepe nero, sottobosco, pellame, note ferrose, rabarbaro, chinotto]
piatto:
  nome: "Coppa di maialino arrosto, purè di zucca, dadolata di mele renette e croccante di farina di castagne"
  cottura: "CBT (68°C per 12h) con finitura in forno a 240°C per croccantezza cotenna"
  struttura: [succulenza, untuosità, tendenza dolce, aromaticità speziata, croccantezza, nota amaricante, acidità bilanciata]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: la spiccata acidità e la trama tannica setosa del nebbiolo di montagna bilanciano l'untuosità della coppa di maialino."
  perche_funziona: "La verticalità del vino pulisce la bocca dal grasso, mentre le note terziarie del vino (affinamento in castagno) creano un ponte aromatico con la farina di castagne del croccante."

---
episodio: "Krug Rosé 28ème Édition"
vino:
  nome: "Krug Rosé 28ème Édition (Maison Krug)"
  vitigno: "Assemblaggio plurivitigno (prevalenza Pinot Noir, con quota 10% vinificata in rosso da Aÿ e Mareuil-sur-Aÿ)"
  tecnica: "Assemblaggio di 32 vini di 6 annate (base 2016, riserve dal 2010), 5 anni di affinamento sui lieviti"
  profilo: [rosa buccia di cipolla, vinoso, ciliegia, prugna, note ossidative, caffè, salmastro, pane in cassetta, perlage cremoso]
piatto:
  nome: "Bignè ripieno di crema di zucca, zafferano e mais"
  cottura: "Forno (sviluppo dell'impasto tipo pizza per rigonfiamento a camera d'aria)"
  struttura: [involucro croccante, ripieno morbido, elevata cremosità, tendenza dolce, note di tostatura, aromaticità dello zafferano]
abbinamento:
  teoria: "Armonia sinestetica per contrasto e completamento: l'acidità e la bollicina dello Champagne sezionano la componente grassa della crema e la tendenza dolce della zucca/mais."
  perche_funziona: "La struttura del Pinot Noir e le note ossidative (caffè) creano un ponte aromatico con la tostatura del mais e la speziatura dello zafferano, pulendo il palato e moltiplicando la percezione sensoriale."

---
episodio: "Barbaresco Riserva Currà 2012 - Bruno Rocca"
vino:
  nome: "Barbaresco Riserva Currà 2012, Bruno Rocca"
  vitigno: "Nebbiolo (selezione massale cloni specifici)"
  tecnica: "Fermentazione in tini di legno, macerazione prolungata (fino a 50 giorni), tecnica a cappello sommerso, affinamento 24-32 mesi in botte grande (16-18 hl)"
  profilo: [ciliegia sotto spirito, violetta, liquirizia, note terziarie, rabarbaro, tè, cipria, tannini setosi, chiusura amaricante]
piatto:
  nome: "Picanha ai profumi mediterranei con caponatina, gel di basilico e zenzero semicandito"
  cottura: "CBT (51°C per 7 ore), piastra"
  struttura: [succulenza moderata, croccantezza (pistacchio/capperi), aromaticità complessa, nota agrodolce, perisistenza speziata]
abbinamento:
  teoria: "Equilibrio per contrapposizione e concordanza; il tannino polimerizzato e la morbidezza del vino bilanciano la componente grassa della picanha, mentre l'alcolicità e la persistenza aromatica sorreggono l'agrodolce della caponata."
  perche_funziona: "La struttura fine ed elegante del Barbaresco rispetta l'intensità del piatto, con lo zenzero semicandito che funge da elemento di pulizia tattile e la sapidità delle olive/capperi che richiama la mineralità del cru Currà."

---
episodio: "Trebbiano d'Abruzzo 2004 - Emidio Pepe"
vino:
  nome: "Trebbiano d'Abruzzo, Emidio Pepe"
  vitigno: "Trebbiano d'Abruzzo"
  tecnica: "Agricoltura biodinamica, pigiatura con i piedi, fermentazione spontanea in vasche di cemento vetrificate, affinamento lungo senza filtrazione."
  profilo: [frutta candita, marmellata, note resinose, idrocarburi, pietra focaia, fiori gialli, sottobosco, speziatura evoluta]
piatto:
  nome: "Hamburger di faraona con maionese al lime e riduzione di acqua di pomodoro"
  cottura: "Griglia (hamburger), emulsione (maionese), riduzione (acqua di pomodoro)"
  struttura: [tendenza dolce del bun, grassezza della maionese, umami dell'acqua di pomodoro, sapidità della pancetta, croccantezza lattuga, succosità carne bianca]
abbinamento:
  teoria: "Equilibrio per contrasto e concordanza: la struttura tannica fenolica del vino e la sua acidità evoluta bilanciano la grassezza della maionese e del bun, mentre la componente resinosa trova una sponda nei profumi erbacei del piatto."
  perche_funziona: "L'acidità del Trebbiano del 2004 pulisce la cavità orale dalla persistenza lipidica della pancetta e della maionese, mentre il corpo del vino sostiene la struttura proteica della faraona senza sovrastarla."

---
episodio: "Extra - Krug Vintage 2011"
vino:
  nome: "Krug Vintage 2011"
  vitigno: "46% Pinot Noir, 37% Chardonnay, 17% Pinot Meunier"
  tecnica: "Vinificazione parziale in legno, fermentazione malolattica, affinamento sui lieviti per 12 anni."
  profilo: [lamponi, fragoline di bosco, agrumi canditi, crosta di pane, yogurt, burro, note di muschio, sentore ossidativo nobile]
piatto:
  nome: "Fiore di zucca ripieno di tartare di gambero rosso"
  cottura: "Fritto in pastella (fecola, farina, birra, ghiaccio) con componenti a crudo, sferificazioni e creme."
  struttura: [tendenza dolce, elevata untuosità, grassezza, complessità aromatica, persistenza umami, nota erbacea]
abbinamento:
  teoria: "Armonia per contrasto e complementarità: il perlage cremoso agisce meccanicamente sgrassando la frittura e la burrata, mentre l'acidità vibrante del millesimato bilancia la dolcezza del crostaceo."
  perche_funziona: "Il richiamo tra le note di erbe officinali (nepitella, timo cedrino) del piatto e la scia sapida e balsamica dello Champagne, unita all'equilibrio tra la struttura del Pinot Noir e la delicatezza del gambero."

---
episodio: "Marianova 2015 - Michele Satta"
vino:
  nome: "Marianova, Michele Satta"
  vitigno: "Sangiovese, Syrah"
  tecnica: "Vinificazione in anfora, affinamento in barrique con svolgimento della malolattica"
  profilo: [ciliegia matura, mora di gelso, viola, vaniglia, cuoio, terra, cacao, pepe, liquirizia, sentori mediterranei]
piatto:
  nome: "Soufflé di grano saraceno e pizzoccheri, fonduta di toma piemontese, patate fondenti, gel di erbette e verza croccante"
  cottura: "Sbollentatura, cottura al vapore, essiccazione, montaggio al burro"
  struttura: [croccantezza, grassezza, untuosità, sapidità, persistenza aromatica intensa, tendenza dolce]
abbinamento:
  teoria: "Equilibrio tra struttura e persistenza. L'acidità e la trama tannica del vino bilanciano la componente lipidica e la sapidità della fonduta di toma."
  perche_funziona: "L'abbinamento è basato sull'armonia tra la complessità aromatica mediterranea del vino e le note vegetali/erbacee del piatto; la struttura importante del vino sostiene perfettamente la grassezza del soufflé, chiudendo il palato con una pulizia millimetrica."

---
episodio: "Marsala Vergine Riserva 2004 Florio"
vino:
  nome: "Marsala Vergine Riserva 2004, Cantine Florio"
  vitigno: "Grillo (90%+) "
  tecnica: "Fortificazione con alcol, affinamento in single wood (caratello) per 18 anni, perdita per evaporazione (Angel's share) del 33%, zonazione basata su distanza dal mare"
  profilo: [iodato, salmastro, dattero, fico secco, albicocca, miele, caramello, caffè, tè esausto, balsamico]
piatto:
  nome: "Polpo piastrato con crema di patate e profumi mediterranei"
  cottura: "Piastratura (reazione di Maillard) e tecnica di riduzione per maionese di polpo"
  struttura: [consistenza tenace, untuosità moderata, sapidità marcata, aromaticità mediterranea, nota amaricante (crumble di pinoli), tendenza dolce della patata]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: abbattimento della percezione alcolica tramite servizio a 8-10°C; la spiccata acidità e sapidità del vino detergono la parte grassa e untuosa del piatto."
  perche_funziona: "Il crumble di pinoli fornisce la nota amaricante e la tostatura necessaria per bilanciare i sentori terziari (ossidativi) del Marsala, creando un ponte di persistenza aromatica intensa tra solido e liquido."

---
episodio: "Dom Pérignon Vintage 2004 Plénitude 2"
vino:
  nome: "Dom Pérignon Vintage 2004 Plénitude 2"
  vitigno: "Pinot Noir, Chardonnay"
  tecnica: "Metodo Classico, vinificazione in acciaio (assenza di legno), lungo affinamento sui lieviti (19 anni)"
  profilo: [miele millefiori, crosta di pane, burro, caramello, pesca matura, scorza di agrumi, nocciolina, iodio, sentori minerali]
piatto:
  nome: "Tortello di canocchie su crema Parmentier con bisque di canocchie e bottarga"
  cottura: "Pasta fresca ripiena, riduzione (bisque), emulsione (crema)"
  struttura: [tendenza dolce, grassezza, umami elevato, persistenza aromatica intensa, sapidità marcata, setosità]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: il perlage e l'acidità verticale del vino detergono la componente lipidica (panna/burro), mentre la sapidità minerale e lo iodato dello Champagne si fondono con l'umami del crostaceo e della bottarga."
  perche_funziona: "L'effetto 'gomma da cancellare' del vino pulisce la bocca dalla grassezza, lasciando spazio alla persistenza umami del piatto, creando un continuo e dinamico rimando tra le componenti aromatiche terziarie del Dom Pérignon e la sapidità del pescato."

---
episodio: "Contrada R 2020 - Passopisciaro"
vino:
  nome: "Contrada R, Passopisciaro"
  vitigno: "Nerello Mascalese 100%"
  tecnica: "Fermentazione in acciaio, affinamento 18 mesi in botti grandi di legno, riposo in bottiglia prima della commercializzazione."
  profilo: [rubino tendente all'aranciato, liquirizia, pepe, anice stellato, prugna, ciliegia matura, arancia sanguinella, note empireumatiche, goudrom, asfalto]
piatto:
  nome: "Filetto di cervo con salsa di mirtilli e vino rosso, spuma di topinambur e chips di topinambur"
  cottura: "Rosolatura in burro (Maillard) e riduzione aromatica (cannella, chiodo di garofano, pepe di Giamaica)"
  struttura: [morbidezza proteica, succulenza, tendenza dolce, sapidità, grassezza della spuma, croccantezza, aromaticità speziata]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: l'acidità e la sapidità del nerello mascalese bilanciano la tendenza dolce della salsa ai mirtilli e della spuma di topinambur."
  perche_funziona: "Il tannino fine e la spiccata freschezza del vino ripuliscono il palato dalla grassezza e dalla succulenza del filetto, mentre la persistenza aromatica del vitigno di alta quota si fonde con le spezie della riduzione."

---
episodio: "Ribolla 3781 Radikon"
vino:
  nome: "Ribolla 3781, Radikon"
  vitigno: "Ribolla Gialla"
  tecnica: "Macerazione prolungata (3 mesi) sulle bucce; invecchiamento 4 anni in botte grande di rovere; affinamento prolungato in bottiglia"
  profilo: [arancia candita, albicocca disidratata, sentori resinosi, nota iodata, salmastra, tannino gallico, materico, persistenza aromatica 9-10s]
piatto:
  nome: "Rana pescatrice con crema di vongole, pancetta e salicornia"
  cottura: "Bardatura in padella, crema di vongole (estrazione liquidi), erbe aromatiche a freddo"
  struttura: [succulenza untuosa, sapidità salmastra, croccantezza (tuile), aromaticità complessa, finale dolce]
abbinamento:
  teoria: "Equilibrio per contrasto tra la struttura tannica/alcolica del vino e l'untuosità/sapidità del piatto; convergenza iodata."
  perche_funziona: "La struttura materica del vino regge l'intensità della pescatrice, mentre l'acidità e il tannino puliscono il palato dalla componente grassa della pancetta e della crema di vongole."

---
episodio: "Capichera - Santigaini 2017"
vino:
  nome: "Santigaini, Capichera"
  vitigno: "Vermentino 100%"
  tecnica: "Vinificazione in purezza, fermentazione spontanea con lieviti indigeni, affinamento sulle fecce fini, maturazione in legno (variabile per annata) seguito da prolungato affinamento in bottiglia."
  profilo: [giallo dorato intenso, balsamico, macchia mediterranea, salvia, alloro, bergamotto, pesca matura, miele millefiori, resina, chiusura amandorlata]
piatto:
  nome: "Salmone marinato, spugna al prezzemolo, salsa acidula, cialda al nero di seppia e caviale"
  cottura: "Marinatura a secco (sale bilanciato 60/40), tecnica CBT o montaggio a sifone (spugna), frittura/cottura su piastra (cialda)"
  struttura: [untuosità, grassezza, sapidità iodata, croccantezza, acidità lattica, note agrumate, retrogusto amaricante]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: l'alcolicità e la sapidità del vino bilanciano l'untuosità del salmone, mentre la struttura del cru sostiene la complessità aromatica del piatto."
  perche_funziona: "La spiccata acidità e la componente salmastra del Vermentino puliscono la bocca dalla grassezza del pesce, mentre la chiusura amandorlata del vino richiama la nota amaricante del caviale e del nero di seppia."

---
episodio: "Villa Bucci 2017 - Verdicchio dei Castelli di Jesi"
vino:
  nome: "Villa Bucci, Bucci"
  vitigno: "Verdicchio"
  tecnica: "Vinificazione in bianco con rimozione delle bucce, fermentazione a temperatura controllata, affinamento per 18 mesi in botti di rovere di Slavonia (75 hl) con micro-ossigenazione naturale, senza fermentazione malolattica."
  profilo: [mandorla, pesca bianca, albicocca, miele millefiori, note minerali, fiori di robinia, erbe aromatiche, agrumi (pompelmo), finale amaricante]
piatto:
  nome: "Faraona ripiena al Casera con fonduta di caprino"
  cottura: "Rosolatura in padella seguita da cottura in forno con aromi"
  struttura: [carne bianca strutturata, grasso, succulenza, sapidità, aromaticità complessa, terroso/vegetale (bietole)]
abbinamento:
  teoria: "Accostamento per contrasto e bilanciamento tra la struttura alcolica/sapida del bianco evoluto e la componente proteica e grassa della selvaggina da penna."
  perche_funziona: "L'acidità del Verdicchio e la sua spiccata sapidità detergono la componente grassa del caprino e della pelle della faraona, nonostante una lieve discrepanza nella persistenza gustativa, risolvibile con l'aggiunta di una base amidacea (pane/focaccia)."

---
episodio: "Amarone de Buris 2010 - Famiglia Tommasi"
vino:
  nome: "Amarone della Valpolicella Riserva de Buris, Tommasi"
  vitigno: "Corvina, Corvinone, Rondinella, Oseleta"
  tecnica: "Appassimento naturale in cassette per 110 giorni (perdita 40% acqua), fermentazione indigena in tini troncoconici (30-40gg), affinamento 5 anni in botti di rovere (15-30hl), 1 anno di sosta in bottiglia"
  profilo: [ciliegia in confettura, marasche sotto spirito, miele di castagno, note terrose, ginepro, rabarbaro, cacao, caffè, alloro, cipria]
piatto:
  nome: "Pancia di maiale croccante con purè affumicato alla senape"
  cottura: "Marinatura 24h, scottatura cotenna con acqua bollente, cottura forno (170°C-200°C) o CBT (72°C/24h) con finitura crisping"
  struttura: [croccantezza, succulenza, elevata grassezza, persistenza aromatica, nota amara (tarassaco), contrasto acido (senape/aceto)]
abbinamento:
  teoria: "Armonia per contrasto e concordanza: tannino polimerizzato e freschezza del vino bilanciano la componente lipidica della carne; la secchezza dell'Amarone contrasta la tendenza dolce del maiale."
  perche_funziona: "Interazione sinestetica tra il tannino fitto del vino e la succulenza proteica, con una risonanza aromatica specifica tra la nota di senape e il finale speziato del vino."

---
episodio: "3x03 - Franciacorta e Alta Cucina"
vino:
  nome: "Palazzo Lana Extreme 2007, Guido Berlucchi"
  vitigno: "100% Pinot Nero"
  tecnica: "Metodo Classico; pressatura soffice a resa estremamente bassa (30L/100kg); affinamento parziale in barrique; oltre 10 anni sui lieviti; dosaggio Extra Brut (2-3 g/l)"
  profilo: [giallo dorato intenso, perlage finissimo e persistente, nocciola, miele, funghi, crosta di pane, frutta candita, note di riduzione, finale amaro-iodato]
piatto:
  nome: "Filetto di rombo con tortino di patate all'aneto e tapenade di olive taggiasche"
  cottura: "Tecnica mista: CBT/cottura tradizionale (pesce), vetrificazione (chips di patata), riduzione (fondo di rombo)"
  struttura: [grassezza del rombo, tendenza dolce della patata, sapidità della tapenade e colatura di alici, croccantezza, acidità agrumata da zest di limone]
abbinamento:
  teoria: "Equilibrio tra struttura e contrasto di consistenze"
  perche_funziona: "L'importante acidità e il perlage spumoso del Pinot Nero in purezza detergono l'untuosità del pesce e delle patate al burro, mentre la complessità terziaria del vino (10 anni sui lieviti) sostiene la persistenza aromatica e la sapidità della tapenade."

---
episodio: "Terza Stagione / Villa Gemma 1999"
vino:
  nome: "Villa Gemma Rosso, Masciarelli"
  vitigno: "Montepulciano d'Abruzzo"
  tecnica: "Vinificazione in acciaio (15-20gg), macerazione pellicolare (20-30gg), affinamento 18 mesi in barrique nuove di rovere francese, ulteriore evoluzione in bottiglia di 2 anni (totale 5 anni pre-release)"
  profilo: [granato, austero, prugna secca, confettura di more, note terrose, ginepro, pepe, liquirizia, cuoio, tannino polveroso]
piatto:
  nome: "Raviolo ripieno di ragù d'anatra con fondo bruno e fonduta di parmigiano"
  cottura: "Fondo bruno ristretto (estrazione profonda), pasta fresca ripiena, fonduta di parmigiano 24 mesi"
  struttura: [sapida, umami, succulenta, croccantezza delle verdure (mirepoix), persistenza aromatica intensa]
abbinamento:
  teoria: "Armonia per concordanza di struttura e complessità, contrappunto tra la morbidezza del tannino evoluto e la spinta umami della fonduta."
  perche_funziona: "Il tannino terziarizzato (non astringente) gestisce la succulenza del fondo d'anatra; l'acidità e l'alcolicità residua del vino ripuliscono il palato dalla componente grassa del parmigiano."

