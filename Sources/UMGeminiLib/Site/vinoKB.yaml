---
episodio: "Stagione 3 - Gewürztraminer Nussbaumer"
vino:
  nome: "Gewürztraminer Nussbaumer, Cantina Tramin"
  vitigno: "Gewürztraminer 100%"
  tecnica: "Vinificazione in solo acciaio per preservare l'integrità aromatica primaria; assenza di affinamento in legno per evitare appesantimenti ossidativi."
  profilo: [mango, papaya, rosa damascena, litchi, chiodi di garofano, cannella, zafferano, uva spina, pesca matura, balsamicità di timo limone]
piatto:
  nome: "Strudel salato di trota salmonata, spuma affumicata e crema di fave"
  cottura: "Assemblaggio con pasta fillo (croccantezza), trota cotta sottovuoto (delicatezza), spuma al sifone (aerazione)"
  struttura: [tendenza dolce delle fave, grassezza della trota, note amaricanti delle uova di pesce, spinta acida del gel di limone, affumicatura tecnica]
abbinamento:
  teoria: "Bilanciamento per contrasto e concordanza: la struttura glicerica e l'alcolicità del vino trovano contrappunto nell'acidità del gel di limone; la complessità aromatica del Gewürztraminer sposa le erbe (nepitella, timo) e l'affumicatura della trota."
  perche_funziona: "L'abbinamento è di tipo 'sinestetico-tecnico': la verticalità del Nussbaumer (acidità/sapidità) domina la grassezza del piatto, mentre la persistenza aromatica del vitigno pulisce il palato, lasciando riemergere le note amaricanti e saline in un gioco di dinamica gustativa alternata."

---
episodio: "3x04 - Taurasi Grande Cerzito"
vino:
  nome: "Taurasi Riserva 'Vigna Grande Cerzito' - Quinto Decimo"
